<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Hub - Future Technology Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Global Variables */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        :root {
            --bg-color: #020306;
            --card-bg: rgba(6, 10, 20, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-blur: blur(20px);
            --color-medicine: #00f2fe;
            --color-ai: #bf55ec;
            --color-defence: #ff4757;
            --color-agriculture: #2ed573;
            --color-solar: #ffa502;
            --color-submit: #3ae374;
            --color-contact: #17c0eb;
            --text-primary: #ffffff;
            --text-secondary: #a3b3c9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(10, 25, 50, 0.3) 0%, transparent 80%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 45px 45px, 45px 45px;
        }

        .container { max-width: 1350px; margin: 0 auto; padding: 3rem 1.5rem; }

        /* Routing Logic */
        .page-section { display: none; opacity: 0; }
        .page-section.active { display: block; animation: sectionFadeIn 0.5s ease-out forwards; }

        @keyframes sectionFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UI Elements */
        header { text-align: center; margin-bottom: 5rem; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900; background: linear-gradient(135deg, #ffffff 20%, #4facfe 60%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .launcher-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; }
        .app-tile { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 3rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.4s; backdrop-filter: var(--card-blur); }
        .app-tile:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.2); }
        
        .back-btn { font-family: 'Orbitron', sans-serif; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); color: #fff; padding: 0.9rem 1.8rem; border-radius: 30px; cursor: pointer; margin-bottom: 2rem; }
        
        .idea-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 3.5rem; margin-bottom: 2rem; }
        
        .form-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 4rem; max-width: 850px; margin: 0 auto; }
        input, textarea { width: 100%; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--card-border); border-radius: 8px; padding: 1.3rem; color: #fff; margin-bottom: 1rem; }
        .submit-idea-btn { background: var(--color-submit); border: none; padding: 1rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 800; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HOME PAGE -->
        <section id="home-page" class="page-section active">
            <header><h1>INNOVATION HUB</h1></header>
            <div class="launcher-grid">
                <div class="app-tile" onclick="navigateTo('medicine-page')"><h3>Medicine</h3></div>
                <div class="app-tile" onclick="navigateTo('ai-page')"><h3>AI Systems</h3></div>
                <div class="app-tile" onclick="navigateTo('defence-page')"><h3>Defence</h3></div>
                <div class="app-tile" onclick="navigateTo('agriculture-page')"><h3>Agriculture</h3></div>
                <div class="app-tile" onclick="navigateTo('solar-page')"><h3>Solar</h3></div>
                <div class="app-tile" onclick="navigateTo('submit-page')"><h3>Submit Idea</h3></div>
            </div>
        </section>

        <!-- CONTENT PAGES -->
        <section id="medicine-page" class="page-section">
            <button class="back-btn" onclick="navigateTo('home-page')">← Back</button>
            <div class="idea-card"><h3>Medicine Future Innovations</h3><p>Details here...</p></div>
        </section>

        <section id="ai-page" class="page-section">
            <button class="back-btn" onclick="navigateTo('home-page')">← Back</button>
            <div class="idea-card"><h3>AI Future Concepts</h3><p>Details here...</p></div>
        </section>

        <section id="defence-page" class="page-section">
            <button class="back-btn" onclick="navigateTo('home-page')">← Back</button>
            <div class="idea-card"><h3>Defence Technologies</h3><p>Details here...</p></div>
        </section>

        <section id="agriculture-page" class="page-section">
            <button class="back-btn" onclick="navigateTo('home-page')">← Back</button>
            <div class="idea-card"><h3>Agriculture Tech</h3><p>Details here...</p></div>
        </section>

        <section id="solar-page" class="page-section">
            <button class="back-btn" onclick="navigateTo('home-page')">← Back</button>
            <div class="idea-card"><h3>Solar Systems</h3><p>Details here...</p></div>
        </section>

        <section id="submit-page" class="page-section">
            <button class="back-btn" onclick="navigateTo('home-page')">← Back</button>
            <div class="form-card">
                <input type="text" id="idea-title" placeholder="Title">
                <textarea id="idea-problem" placeholder="Problem"></textarea>
                <textarea id="idea-solution" placeholder="Solution"></textarea>
                <button class="submit-idea-btn" onclick="sendEmail()">SUBMIT</button>
            </div>
        </section>
    </div>

    <script>
        function navigateTo(sectionId) {
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
            const target = document.getElementById(sectionId);
            if (target) {
                target.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'instant' });
            }
        }

        function sendEmail() {
            const title = document.getElementById('idea-title').value;
            const problem = document.getElementById('idea-problem').value;
            const solution = document.getElementById('idea-solution').value;
            window.location.href = `mailto:sosanu491@gmail.com?subject=Idea: ${encodeURIComponent(title)}&body=${encodeURIComponent(problem + "\n\n" + solution)}`;
        }
    </script>
</body>
</html>
